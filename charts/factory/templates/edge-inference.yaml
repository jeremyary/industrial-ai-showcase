apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-inference
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: edge-inference
    {{- include "factory.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.edgeInference.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: edge-inference
      {{- include "factory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: edge-inference
        {{- include "factory.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "factory.siteName" . }}-sa
      containers:
        - name: vllm
          image: {{ .Values.edgeInference.image }}
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HOME
              value: /models
            - name: HF_HOME
              value: /models/.cache/huggingface
          args:
            - "--model"
            - {{ .Values.edgeInference.model }}
            - "--download-dir"
            - "/models"
            - "--max-model-len"
            - {{ .Values.edgeInference.maxModelLen | default "4096" | quote }}
            - "--reasoning-parser"
            - "qwen3"
            - "--port"
            - {{ .Values.edgeInference.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.edgeInference.port }}
          resources:
            requests:
              nvidia.com/gpu: {{ .Values.edgeInference.gpuCount | quote }}
              memory: {{ .Values.edgeInference.resources.requests.memory }}
              cpu: {{ .Values.edgeInference.resources.requests.cpu | quote }}
            limits:
              nvidia.com/gpu: {{ .Values.edgeInference.gpuCount | quote }}
              memory: {{ .Values.edgeInference.resources.limits.memory }}
              cpu: {{ .Values.edgeInference.resources.limits.cpu | quote }}
          volumeMounts:
            - name: model-weights
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
        - name: inference-sidecar
          image: {{ .Values.edgeInference.sidecarImage }}
          command: ["python", "/scripts/edge_inference.py"]
          env:
            - name: VLLM_URL
              value: "http://localhost:{{ .Values.edgeInference.port }}/v1/chat/completions"
            - name: MODEL_NAME
              value: {{ .Values.edgeInference.model }}
            - name: MQTT_BROKER
              value: edge-broker
            - name: MQTT_PORT
              value: {{ .Values.edgeBroker.mqttPort | quote }}
            - name: MQTT_TOPIC_PREFIX
              value: {{ .Values.mqttTopicPrefix | quote }}
            - name: CAMERA_URL
              value: "http://camera-feed:{{ .Values.cameraFeed.httpPort }}"
            - name: POLL_INTERVAL
              value: "5.0"
            - name: SITE_NAME
              value: {{ include "factory.siteName" . }}
            - name: CAMERAS
              value: {{ .Values.cameraFeed.cameras | join "," | quote }}
          volumeMounts:
            - name: inference-script
              mountPath: /scripts
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: model-weights
        - name: inference-script
          configMap:
            name: edge-inference-config
      nodeSelector:
        {{- toYaml .Values.edgeInference.gpu.nodeSelector | nindent 8 }}
      tolerations:
        - key: {{ .Values.edgeInference.gpu.toleration.key }}
          operator: {{ .Values.edgeInference.gpu.toleration.operator }}
          effect: {{ .Values.edgeInference.gpu.toleration.effect }}
