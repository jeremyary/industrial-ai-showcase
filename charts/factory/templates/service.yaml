apiVersion: v1
kind: Service
metadata:
  name: camera-feed
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: camera-feed
    {{- include "factory.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.cameraFeed.httpPort }}
      targetPort: http
  selector:
    app.kubernetes.io/component: camera-feed
    {{- include "factory.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: edge-inference
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: edge-inference
    {{- include "factory.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.edgeInference.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: edge-inference
    {{- include "factory.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: edge-broker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: edge-broker
    {{- include "factory.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: mqtt
      port: {{ .Values.edgeBroker.mqttPort }}
      targetPort: mqtt
    - name: websocket
      port: {{ .Values.edgeBroker.websocketPort }}
      targetPort: websocket
  selector:
    app.kubernetes.io/component: edge-broker
    {{- include "factory.selectorLabels" . | nindent 4 }}
