apiVersion: v1
kind: ConfigMap
metadata:
  name: factory-dashboard-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: factory-dashboard
    {{- include "factory.labels" . | nindent 4 }}
data:
  mqtt-proxy.conf: |
    location /mqtt {
        proxy_pass http://edge-broker:{{ .Values.edgeBroker.websocketPort }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    location /cameras/ {
        proxy_pass http://camera-feed:{{ .Values.cameraFeed.httpPort }}/cameras/;
        proxy_set_header Host $host;
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ include "factory.siteName" . }} — Factory Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
      :root {
        --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
        --text: #e1e4ed; --text-dim: #8b8fa3;
        --safe: #22c55e; --caution: #eab308; --danger: #ef4444; --accent: #3b82f6;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg); color: var(--text); min-height: 100vh;
      }
      header {
        background: var(--surface); border-bottom: 1px solid var(--border);
        padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      }
      header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
      .header-right { display: flex; align-items: center; gap: 16px; }
      .mqtt-status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-dim); }
      .mqtt-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
      .mqtt-dot.connected { background: var(--safe); }
      .pipeline-status {
        font-size: 12px; padding: 4px 12px; border-radius: 4px;
        background: var(--border); color: var(--text-dim);
      }
      .pipeline-status.active { background: rgba(59,130,246,0.2); color: var(--accent); }

      .main-layout {
        display: grid; grid-template-columns: 1fr 380px; gap: 16px;
        padding: 16px; height: calc(100vh - 60px);
      }

      .cameras-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 16px; align-content: start;
      }
      .camera-card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 8px; overflow: hidden;
      }
      .camera-card-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px; border-bottom: 1px solid var(--border);
      }
      .camera-card-name {
        font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      }
      .status-badge {
        font-size: 11px; font-weight: 700; padding: 3px 10px;
        border-radius: 4px; letter-spacing: 0.5px;
      }
      .status-SAFE { background: var(--safe); color: #052e16; }
      .status-CAUTION { background: var(--caution); color: #422006; }
      .status-DANGER { background: var(--danger); color: white; animation: pulse 1s infinite; }
      .status-UNKNOWN { background: var(--border); color: var(--text-dim); }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

      .camera-feed {
        background: #000; display: flex; align-items: center; justify-content: center;
        min-height: 240px; position: relative;
      }
      .camera-feed img {
        width: 100%; height: auto; display: block;
      }
      .camera-feed .no-feed {
        color: var(--text-dim); font-size: 13px; padding: 40px;
      }
      .camera-analysis {
        padding: 12px 14px; border-top: 1px solid var(--border);
      }
      .analysis-report {
        font-size: 13px; line-height: 1.5; color: var(--text-dim);
        padding: 8px 12px; background: rgba(255,255,255,0.02);
        border-radius: 6px; border-left: 3px solid var(--border);
      }
      .analysis-report.status-SAFE { border-left-color: var(--safe); }
      .analysis-report.status-CAUTION { border-left-color: var(--caution); }
      .analysis-report.status-DANGER { border-left-color: var(--danger); }
      .analysis-time {
        font-size: 11px; color: var(--text-dim); margin-top: 6px;
        font-family: 'SF Mono', 'Fira Code', monospace;
      }
      .hazard-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
      .hazard-tag {
        font-size: 10px; padding: 2px 8px; border-radius: 3px;
        font-weight: 600; letter-spacing: 0.3px;
      }
      .hazard-tag.low { background: rgba(234,179,8,0.15); color: var(--caution); }
      .hazard-tag.medium { background: rgba(234,179,8,0.25); color: var(--caution); }
      .hazard-tag.high { background: rgba(239,68,68,0.2); color: var(--danger); }

      .sidebar { display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }

      .info-panel {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 8px; padding: 16px;
      }
      .info-panel h3 {
        font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
        color: var(--text-dim); margin-bottom: 12px;
      }
      .stat-row {
        display: flex; justify-content: space-between; padding: 6px 0;
        font-size: 13px; border-bottom: 1px solid var(--border);
      }
      .stat-row:last-child { border-bottom: none; }
      .stat-value { font-weight: 600; }

      .event-log {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 8px; flex: 1; display: flex; flex-direction: column; min-height: 0;
      }
      .event-log h3 {
        font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
        color: var(--text-dim); padding: 10px 14px; border-bottom: 1px solid var(--border);
      }
      .event-list {
        flex: 1; overflow-y: auto; padding: 8px;
        font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6;
      }
      .event-entry { padding: 2px 8px; }
      .event-time { color: var(--text-dim); }
      .event-camera { color: var(--accent); font-weight: 600; }
      .event-status-SAFE { color: var(--safe); }
      .event-status-CAUTION { color: var(--caution); }
      .event-status-DANGER { color: var(--danger); }
    </style>
    </head>
    <body>
    <header>
      <h1>{{ include "factory.siteName" . | upper | replace "-" " " }}</h1>
      <div class="header-right">
        <div class="pipeline-status" id="pipelineStatus">Pipeline: waiting</div>
        <div class="mqtt-status">
          <div class="mqtt-dot" id="mqttDot"></div>
          <span id="mqttLabel">Disconnected</span>
        </div>
      </div>
    </header>

    <div class="main-layout">
      <div class="cameras-grid" id="camerasGrid"></div>
      <div class="sidebar">
        <div class="info-panel">
          <h3>Inference Pipeline</h3>
          <div class="stat-row">
            <span>Cameras</span>
            <span class="stat-value" id="statCameras">0</span>
          </div>
          <div class="stat-row">
            <span>Analyses run</span>
            <span class="stat-value" id="statAnalyses">0</span>
          </div>
          <div class="stat-row">
            <span>Open hazards</span>
            <span class="stat-value" id="statHazards">0</span>
          </div>
          <div class="stat-row">
            <span>Last update</span>
            <span class="stat-value" id="statLastUpdate">—</span>
          </div>
        </div>
        <div class="event-log">
          <h3>Event Log</h3>
          <div class="event-list" id="eventLog"></div>
        </div>
      </div>
    </div>

    <script>
    const CAMERAS = [{{- range $i, $cam := .Values.cameraFeed.cameras }}{{ if $i }}, {{ end }}"{{ $cam }}"{{- end }}];
    const cameraState = {};
    let client = null;
    let analysisCount = 0;

    function init() {
      // Build camera cards
      const grid = document.getElementById('camerasGrid');
      CAMERAS.forEach(cam => {
        const camDisplay = cam.replace(/_/g, ' ');
        const card = document.createElement('div');
        card.className = 'camera-card';
        card.id = 'card-' + cam;
        card.innerHTML =
          '<div class="camera-card-header">' +
            '<span class="camera-card-name">' + camDisplay + '</span>' +
            '<span class="status-badge status-UNKNOWN" id="badge-' + cam + '">WAITING</span>' +
          '</div>' +
          '<div class="camera-feed">' +
            '<img id="feed-' + cam + '" alt="' + camDisplay + '" style="display:none">' +
            '<span class="no-feed" id="nofeed-' + cam + '">Connecting to camera...</span>' +
          '</div>' +
          '<div class="camera-analysis">' +
            '<div class="analysis-report status-UNKNOWN" id="report-' + cam + '">Awaiting first analysis...</div>' +
            '<div class="hazard-tags" id="hazards-' + cam + '"></div>' +
            '<div class="analysis-time" id="time-' + cam + '"></div>' +
          '</div>';
        grid.appendChild(card);
      });
      document.getElementById('statCameras').textContent = CAMERAS.length;
      connectMqtt();
      refreshFeeds();
      setInterval(refreshFeeds, 500);
    }

    function connectMqtt() {
      const wsUrl = 'wss://' + window.location.hostname + '/mqtt';
      client = mqtt.connect(wsUrl);
      client.on('connect', function() {
        document.getElementById('mqttDot').classList.add('connected');
        document.getElementById('mqttLabel').textContent = 'Connected';
        client.subscribe('{{ .Values.mqttTopicPrefix }}/#');
        logEvent('system', 'MQTT connected');
      });
      client.on('close', function() {
        document.getElementById('mqttDot').classList.remove('connected');
        document.getElementById('mqttLabel').textContent = 'Disconnected';
      });
      client.on('message', function(topic, message) {
        try {
          var data = JSON.parse(message.toString());
          var parts = topic.split('/');
          if (parts.length >= 3) {
            handleSafety(parts[2], data);
          }
        } catch (e) { console.error('Parse error:', e); }
      });
    }

    function handleSafety(cam, data) {
      var status = data.overall_status || 'UNKNOWN';
      var prev = cameraState[cam];
      cameraState[cam] = data;
      analysisCount++;

      // Update badge
      var badge = document.getElementById('badge-' + cam);
      if (badge) {
        badge.textContent = status;
        badge.className = 'status-badge status-' + status;
      }

      // Update report
      var report = document.getElementById('report-' + cam);
      if (report) {
        report.textContent = data.report || data.summary || status;
        report.className = 'analysis-report status-' + status;
      }

      // Update hazard tags
      var hazardEl = document.getElementById('hazards-' + cam);
      if (hazardEl) {
        hazardEl.textContent = '';
        (data.hazards || []).forEach(function(h) {
          var tag = document.createElement('span');
          tag.className = 'hazard-tag ' + (h.severity || 'low');
          tag.textContent = (h.type || '').replace(/_/g, ' ') + ': ' + (h.detail || '');
          hazardEl.appendChild(tag);
        });
      }

      // Update time
      var timeEl = document.getElementById('time-' + cam);
      if (timeEl) {
        var ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('en-US', {hour12: false}) : '';
        timeEl.textContent = 'Analyzed: ' + ts;
      }

      // Pipeline status
      var ps = document.getElementById('pipelineStatus');
      ps.textContent = 'Pipeline: active';
      ps.classList.add('active');

      // Stats
      document.getElementById('statAnalyses').textContent = analysisCount;
      var totalHazards = 0;
      Object.values(cameraState).forEach(function(c) {
        totalHazards += (c.hazards || []).length;
      });
      document.getElementById('statHazards').textContent = totalHazards;
      document.getElementById('statLastUpdate').textContent =
        new Date().toLocaleTimeString('en-US', {hour12: false});

      // Log status changes
      if (!prev || prev.overall_status !== status) {
        var preview = (data.report || '').substring(0, 100);
        logEvent(cam, status + ' — ' + preview, status);
      }
    }

    function refreshFeeds() {
      var ts = Date.now();
      CAMERAS.forEach(function(cam) {
        var img = document.getElementById('feed-' + cam);
        var nofeed = document.getElementById('nofeed-' + cam);
        if (!img) return;
        img.onload = function() {
          img.style.display = 'block';
          if (nofeed) nofeed.style.display = 'none';
        };
        img.onerror = function() {
          img.style.display = 'none';
          if (nofeed) { nofeed.style.display = 'block'; nofeed.textContent = 'Camera offline'; }
        };
        img.src = '/cameras/' + cam + '/latest.jpg?t=' + ts;
      });
    }

    function logEvent(source, message, status) {
      var log = document.getElementById('eventLog');
      var time = new Date().toLocaleTimeString('en-US', { hour12: false });
      var cls = status ? 'event-status-' + status : '';
      var entry = document.createElement('div');
      entry.className = 'event-entry';
      var timeSpan = document.createElement('span');
      timeSpan.className = 'event-time';
      timeSpan.textContent = time + ' ';
      var camSpan = document.createElement('span');
      camSpan.className = 'event-camera';
      camSpan.textContent = '[' + source.replace(/_/g, ' ') + '] ';
      var msgSpan = document.createElement('span');
      msgSpan.className = cls;
      msgSpan.textContent = message;
      entry.appendChild(timeSpan);
      entry.appendChild(camSpan);
      entry.appendChild(msgSpan);
      log.insertBefore(entry, log.firstChild);
      while (log.children.length > 100) log.removeChild(log.lastChild);
    }

    init();
    </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: factory-dashboard
    {{- include "factory.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.factoryDashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: factory-dashboard
      {{- include "factory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: factory-dashboard
        {{- include "factory.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "factory.siteName" . }}-sa
      containers:
        - name: nginx
          image: {{ .Values.factoryDashboard.image }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.factoryDashboard.httpPort }}
          resources:
            {{- toYaml .Values.factoryDashboard.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: nginx-config
              mountPath: /opt/app-root/etc/nginx.default.d/mqtt-proxy.conf
              subPath: mqtt-proxy.conf
            - name: dashboard-html
              mountPath: /opt/app-root/src/index.html
              subPath: index.html
      volumes:
        - name: nginx-config
          configMap:
            name: factory-dashboard-config
            items:
              - key: mqtt-proxy.conf
                path: mqtt-proxy.conf
        - name: dashboard-html
          configMap:
            name: factory-dashboard-config
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: factory-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: factory-dashboard
    {{- include "factory.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.factoryDashboard.httpPort }}
      targetPort: http
  selector:
    app.kubernetes.io/component: factory-dashboard
    {{- include "factory.selectorLabels" . | nindent 4 }}
---
{{- if .Values.factoryDashboard.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: factory-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: factory-dashboard
    {{- include "factory.labels" . | nindent 4 }}
  annotations:
    haproxy.router.openshift.io/timeout: "3600s"
spec:
  to:
    kind: Service
    name: factory-dashboard
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
