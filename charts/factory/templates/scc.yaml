apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ include "factory.fullname" . }}-scc
  labels:
    {{- include "factory.labels" . | nindent 4 }}
allowPrivilegedContainer: false
runAsUser:
  type: MustRunAsRange
seLinuxContext:
  type: MustRunAs
fsGroup:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
users:
  - system:serviceaccount:{{ .Release.Namespace }}:{{ include "factory.siteName" . }}-sa
