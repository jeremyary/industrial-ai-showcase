apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-broker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: edge-broker
    {{- include "factory.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.edgeBroker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: edge-broker
      {{- include "factory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: edge-broker
        {{- include "factory.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "factory.siteName" . }}-sa
      containers:
        - name: mosquitto
          image: {{ .Values.edgeBroker.image }}
          ports:
            - name: mqtt
              containerPort: {{ .Values.edgeBroker.mqttPort }}
            - name: websocket
              containerPort: {{ .Values.edgeBroker.websocketPort }}
          resources:
            {{- toYaml .Values.edgeBroker.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: mosquitto-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
      volumes:
        - name: mosquitto-config
          configMap:
            name: edge-broker-config
