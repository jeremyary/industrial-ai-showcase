apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "factory.siteName" . }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "factory.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow intra-namespace traffic
    - from:
        - podSelector: {}
    # Allow OpenShift router ingress to routed services
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  egress:
    # Allow intra-namespace traffic
    - to:
        - podSelector: {}
    # Allow DNS — OCP CoreDNS listens on port 5353 in openshift-dns namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
    # Allow MQTT egress to central-broker only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-showcase-central
          podSelector:
            matchLabels:
              app.kubernetes.io/component: central-broker
      ports:
        - protocol: TCP
          port: {{ .Values.centralBrokerPort }}
    # Allow HTTPS egress for model downloads (HuggingFace)
    - ports:
        - protocol: TCP
          port: 443
