apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: dashboard
    {{- include "central.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard
      {{- include "central.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard
        {{- include "central.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.dashboard.image }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.httpPort }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: mqtt-proxy
              mountPath: /opt/app-root/etc/nginx.default.d/mqtt-proxy.conf
              subPath: mqtt-proxy.conf
            - name: dashboard-html
              mountPath: /opt/app-root/src/index.html
              subPath: index.html
      volumes:
        - name: mqtt-proxy
          configMap:
            name: dashboard-config
            items:
              - key: mqtt-proxy.conf
                path: mqtt-proxy.conf
        - name: dashboard-html
          configMap:
            name: dashboard-config
            items:
              - key: index.html
                path: index.html
