{{- if .Values.isaacSim.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaac-sim
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: isaac-sim
    {{- include "central.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: isaac-sim
      {{- include "central.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: isaac-sim
        {{- include "central.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.isaacSim.serviceAccount }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: isaac-sim
          image: {{ .Values.isaacSim.image }}
          securityContext:
            privileged: true
            runAsUser: 0
          ports:
            - name: webrtc
              containerPort: {{ .Values.isaacSim.webrtcPort }}
              hostPort: {{ .Values.isaacSim.webrtcPort }}
            - name: camera-http
              containerPort: 8211
          resources:
            requests:
              nvidia.com/gpu: {{ .Values.isaacSim.gpuCount | quote }}
              memory: {{ .Values.isaacSim.resources.requests.memory }}
              cpu: {{ .Values.isaacSim.resources.requests.cpu | quote }}
            limits:
              nvidia.com/gpu: {{ .Values.isaacSim.gpuCount | quote }}
              memory: {{ .Values.isaacSim.resources.limits.memory }}
              cpu: {{ .Values.isaacSim.resources.limits.cpu | quote }}
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PRIVACY_CONSENT
              value: "Y"
            - name: OMNI_SERVER
              value: "NO"
          readinessProbe:
            httpGet:
              path: /
              port: camera-http
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /
              port: camera-http
            initialDelaySeconds: 600
            periodSeconds: 60
            failureThreshold: 10
          volumeMounts:
            - name: cache
              mountPath: /root/.cache/ov
            - name: simready
              mountPath: /simready-warehouse
            - name: workspace-scripts
              mountPath: /workspace
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: isaac-sim-cache
        - name: simready
          persistentVolumeClaim:
            claimName: isaac-sim-simready
        - name: workspace-scripts
          configMap:
            name: isaac-sim-workspace
      nodeSelector:
        {{- toYaml .Values.isaacSim.gpu.nodeSelector | nindent 8 }}
      tolerations:
        - key: {{ .Values.isaacSim.gpu.toleration.key }}
          operator: {{ .Values.isaacSim.gpu.toleration.operator }}
          effect: {{ .Values.isaacSim.gpu.toleration.effect }}
{{- end }}
