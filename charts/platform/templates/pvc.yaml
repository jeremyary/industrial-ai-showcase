{{- if .Values.isaacSim.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: isaac-sim-cache
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "central.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.isaacSim.cache.storageClass }}
  resources:
    requests:
      storage: {{ .Values.isaacSim.cache.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: isaac-sim-simready
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "central.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.isaacSim.simready.storageClass }}
  resources:
    requests:
      storage: {{ .Values.isaacSim.simready.size }}
{{- end }}
