  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mlops.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.storage.modelArtifacts.size }}
---
