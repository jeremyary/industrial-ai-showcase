{{- if .Values.cosmosTransfer.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nim-cache
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mlops.labels" . | nindent 4 }}
spec:
