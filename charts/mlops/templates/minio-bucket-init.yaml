# This project was developed with assistance from AI tools.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mlops.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: mc
        image: {{ .Values.minio.mcImage }}
        env:
        - name: HOME
          value: /tmp
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_PASSWORD
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for MinIO to be ready..."
          until mc alias set local http://minio.{{ .Release.Namespace }}.svc:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD 2>/dev/null; do
            echo "MinIO not ready, retrying in 5s..."
            sleep 5
          done
          {{- range .Values.minio.buckets }}
          mc mb local/{{ . }} --ignore-existing
          {{- end }}
          echo "Buckets created successfully"
      restartPolicy: Never
  backoffLimit: 5
