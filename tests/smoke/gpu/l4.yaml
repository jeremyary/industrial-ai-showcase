# L4 GPU smoke test. Run manually: oc apply -f tests/smoke/gpu/l4.yaml
# Expect: Job completes; logs show `nvidia-smi` output with an L4 device.
# Clean up: oc delete -f tests/smoke/gpu/l4.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-smoke-l4
  namespace: default
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L4
      containers:
        - name: smoke
          image: nvcr.io/nvidia/cuda:12.6.0-base-ubi9
          command: ["nvidia-smi"]
          resources:
            limits:
              nvidia.com/gpu: "1"
