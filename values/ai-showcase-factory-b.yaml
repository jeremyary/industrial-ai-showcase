# Factory B — warehouse safety & ladder compliance
siteName: ai-showcase-factory-b

cameraFeed:
  cameras:
    - safety_zone
    - ladder_area
  videoSources:
    # NGC VSS Blueprint sample data (requires ngc-api-key secret)
    ngc:
      resource: nvidia/vss-developer/dev-profile-sample-data
      version: "3.1.0"
      # Map camera names to filenames inside the tarball
      fileMap:
        safety_zone: warehouse_safety_0002.mp4
        ladder_area: sample-warehouse-ladder.mp4
