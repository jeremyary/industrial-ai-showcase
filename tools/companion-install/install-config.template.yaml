# Template rendered by the install steps in ../README.md. Two placeholders
# are substituted at render time:
#   __PULL_SECRET__  — contents of pull-secret.txt (never committed).
#   __SSH_KEY__      — the operator's SSH public key (never committed).
# Both come from local files on the operator's workstation.
apiVersion: v1
baseDomain: lab.local
metadata:
  name: companion
# FIPS is a day-1-only decision. The cluster comes up genuinely FIPS-mode
# (fips=1 on the RHCOS kernel cmdline, FIPS-validated crypto providers in
# the payload). Per ADR-017 the companion is where the FIPS story lives.
#
# The Fedora 43 install host is not itself in FIPS mode, so the static
# openshift-install binary's host-crypt check is bypassed at render time
# via OPENSHIFT_INSTALL_SKIP_HOSTCRYPT_VALIDATION=1 (see ../README.md).
# The cluster will carry install.openshift.io/hostcrypt-check-bypassed=true
# — material for a formal audit, immaterial for demonstrating posture.
fips: true
controlPlane:
  name: master
  replicas: 1
compute:
  - name: worker
    replicas: 0
networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 10.0.0.0/24
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
platform:
  none: {}
bootstrapInPlace:
  installationDisk: /dev/vda
pullSecret: '__PULL_SECRET__'
sshKey: '__SSH_KEY__'
