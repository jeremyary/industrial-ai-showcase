worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;
    access_log off;

    upstream console_backend {
        server showcase-console-backend.fleet-ops.svc.cluster.local:8090;
    }

    server {
        listen 8080 default_server;
        root /opt/app-root/src;
        index index.html;

        location /api/ {
            proxy_pass http://console_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        location = /healthz { proxy_pass http://console_backend; }
        location = /readyz  { proxy_pass http://console_backend; }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
