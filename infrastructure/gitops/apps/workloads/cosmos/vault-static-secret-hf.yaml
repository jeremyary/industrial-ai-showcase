# HuggingFace token for pulling gated models. If `nvidia/Cosmos-Reason2-8B`
# becomes a gated repo, vLLM reads HF_TOKEN from env. Not gated today, but
# the plumbing is ready. Vault path seeded once: `vault kv put kv/hf/token token=<hf_...>`.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: hf-token
  namespace: cosmos
spec:
  vaultAuthRef: vault
  type: kv-v2
  mount: kv
  path: hf/token
  destination:
    name: hf-token
    create: true
    overwrite: true
  refreshAfter: 1h
