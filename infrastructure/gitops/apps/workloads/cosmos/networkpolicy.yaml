apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cosmos-reason
  namespace: cosmos
  labels:
    app: cosmos-reason
spec:
  podSelector:
    matchLabels:
      app: cosmos-reason
  policyTypes:
    - Ingress
    - Egress
  egress:
    - {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cosmos
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleet-ops
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
      ports:
        - protocol: TCP
          port: 8000
