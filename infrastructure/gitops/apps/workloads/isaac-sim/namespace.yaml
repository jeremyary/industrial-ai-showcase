apiVersion: v1
kind: Namespace
metadata:
  name: isaac-sim
  annotations:
    # Isaac Sim images run as root (EULA entrypoint, various OV caches).
    # Match the nucleus pattern: disable SCC→PSA sync + pin PSA=privileged.
    # The anyuid SCC grant on the `isaac-sim` SA handles OpenShift-side policy.
    security.openshift.io/scc.podSecurityLabelSync: "false"
  labels:
    phase: phase-1
    layer: workload
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    openshift.io/cluster-monitoring: "true"
    istio.io/rev: default
