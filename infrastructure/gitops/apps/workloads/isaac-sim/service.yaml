apiVersion: v1
kind: Service
metadata:
  name: isaac-sim
  namespace: isaac-sim
  labels:
    app: isaac-sim
spec:
  selector:
    app: isaac-sim
  # Istio uses port `name` as a protocol hint. `tcp-*` prefix makes the sidecar
  # treat these as opaque TCP streams — correct for Kit's WebSocket-signaling
  # + binary-WebRTC-media traffic (envoy's HTTP auto-sniffing returns 503).
  ports:
    - name: tcp-livestream
      port: 8011
      targetPort: tcp-livestream
      protocol: TCP
    - name: tcp-webrtc
      port: 49100
      targetPort: tcp-webrtc
      protocol: TCP
    - name: tcp-mjpeg
      port: 8090
      targetPort: tcp-mjpeg
      protocol: TCP
  type: ClusterIP
