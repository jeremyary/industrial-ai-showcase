apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaac-sim
  namespace: isaac-sim
  labels:
    app: isaac-sim
    phase: phase-1
spec:
  replicas: 1
  # Isaac Sim holds exclusive locks on the Omniverse local cache PVC —
  # Recreate prevents two pods fighting for the same file locks.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: isaac-sim
  template:
    metadata:
      labels:
        app: isaac-sim
    spec:
      serviceAccountName: isaac-sim
      imagePullSecrets:
        - name: ngc-pull-secret
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1234
      containers:
        - name: isaac-sim
          image: nvcr.io/nvidia/isaac-sim:6.0.0-dev2
          imagePullPolicy: IfNotPresent
          # Headless Kit runner with WebRTC livestream for viewport embedding.
          # See workloads/isaac-sim/scenarios/ for scene/scenario configs that
          # override default startup behavior.
          command:
            - /bin/bash
            - -c
            - |
              set -e
              /isaac-sim/kit/python/bin/python3 -m pip install --quiet confluent-kafka || true
              [ -f /tmp/ffmpeg ] || /isaac-sim/kit/python/bin/python3 -c "import lzma,tarfile,urllib.request,os;r=urllib.request.urlopen('https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz',timeout=120);xz=lzma.open(r);t=tarfile.open(fileobj=xz,mode='r|');[((lambda m:(open('/tmp/ffmpeg','wb').write(t.extractfile(m).read()),os.chmod('/tmp/ffmpeg',0o755)))(m)) for m in t if m.name.endswith('/bin/ffmpeg') and m.isfile()][:1]" || true
              /isaac-sim/runheadless.sh \
                --/app/window/hideUi=true \
                --/app/livestream/webrtcEnabled=true \
                --/app/livestream/nativeStreamerEnabled=true \
                --/persistent/isaac/asset_root/default="omniverse://nucleus.apps.jary-qs-0323.7w5j.p1.openshiftapps.com/Projects/showcase/assets/Isaac/6.0" \
                --/persistent/isaac/asset_root/nvidia="omniverse://nucleus.apps.jary-qs-0323.7w5j.p1.openshiftapps.com/Projects/showcase/assets/Isaac/6.0" \
                --exec /scenarios/warehouse_baseline.py
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PRIVACY_CONSENT
              value: "Y"
            - name: OMNI_KIT_ACCEPT_EULA
              value: "Y"
            - name: OMNI_SERVER
              value: "omniverse://nucleus-api.omniverse-nucleus.svc.cluster.local"
            - name: SCENE_PACK_URL
              value: "omniverse://nucleus.apps.jary-qs-0323.7w5j.p1.openshiftapps.com/Projects/showcase/custom/Warehouse_edit.usd"
            - name: NUCLEUS_USER
              value: omniverse
            - name: NUCLEUS_PASS
              valueFrom:
                secretKeyRef:
                  name: nucleus-passwords
                  key: master-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: fleet-kafka-bootstrap.fleet-ops.svc:9092
            - name: KAFKA_SECURITY_PROTOCOL
              value: PLAINTEXT
            - name: PALLET_ASSET_URL
              value: ""
            - name: WARP_CACHE_PATH
              value: /tmp/warp_cache
            - name: MPLCONFIGDIR
              value: /tmp/matplotlib
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
          ports:
            # Port names use Istio's protocol-prefix convention (`tcp-*`) so
            # the sidecar treats them as opaque TCP. Kit's livestream endpoint
            # is WebSocket + binary media on the same port; auto-HTTP-sniffing
            # confuses envoy and returns 503 on the initial probe.
            - name: tcp-livestream
              containerPort: 8011
              protocol: TCP
            - name: tcp-webrtc
              containerPort: 49100
              protocol: TCP
            - name: tcp-mjpeg
              containerPort: 8090
              protocol: TCP
          resources:
            requests:
              cpu: 2
              memory: 8Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 8
              memory: 24Gi
              nvidia.com/gpu: 1
          volumeMounts:
            - name: scenarios
              mountPath: /scenarios
              readOnly: true
            - name: cache
              mountPath: /isaac-sim/.cache/ov
              subPath: cache
            - name: cache
              mountPath: /isaac-sim/.nv/ComputeCache
              subPath: compute-cache
            - name: cache
              mountPath: /root/.nvidia-omniverse
              subPath: nvidia-omniverse
            - name: logs
              mountPath: /root/.nvidia-omniverse/logs
            - name: logs
              mountPath: /isaac-sim/kit/logs
              subPath: kit-logs
            - name: tmp
              mountPath: /tmp
          # Rendering + asset compile on first cold-start can take 5-10 minutes
          # before Kit app accepts connections. Wide initial-delay tolerances.
          readinessProbe:
            tcpSocket:
              port: tcp-livestream
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            tcpSocket:
              port: tcp-livestream
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: scenarios
          configMap:
            name: isaac-sim-scenarios
            defaultMode: 0444
        - name: cache
          persistentVolumeClaim:
            claimName: isaac-sim-cache
        - name: logs
          persistentVolumeClaim:
            claimName: isaac-sim-logs
        - name: tmp
          emptyDir:
            sizeLimit: 10Gi
