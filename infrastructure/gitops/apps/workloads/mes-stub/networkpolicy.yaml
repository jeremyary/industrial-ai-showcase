apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mes-stub
  namespace: fleet-ops
  labels:
    app: mes-stub
spec:
  podSelector:
    matchLabels:
      app: mes-stub
  policyTypes:
    - Ingress
    - Egress
  egress:
    - {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleet-ops
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - protocol: TCP
          port: 8083
