---
apiVersion: v1
kind: Namespace
metadata:
  name: omni-streaming
  annotations:
    # KAS-spawned Kit app pods run as root; this namespace is the dynamic
    # target for those pods per the Session Manager's spawn model. Match the
    # same PSA posture as `isaac-sim` (ADR-024's native-K8s-Nucleus pattern).
    security.openshift.io/scc.podSecurityLabelSync: "false"
  labels:
    phase: phase-1
    layer: workload
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    openshift.io/cluster-monitoring: "true"
    # KAS internally uses plain HTTP between its services; opting out of mesh
    # until Phase 2 wires the streaming-services as an Istio VirtualService
    # mesh-gateway pattern.
    istio-injection: disabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: flux-operators
  labels:
    phase: phase-1
    layer: platform
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
