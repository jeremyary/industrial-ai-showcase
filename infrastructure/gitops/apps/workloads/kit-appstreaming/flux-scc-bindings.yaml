# Flux2 controllers set `fsGroup: 1337` + `runAsNonRoot: true` +
# `seccompProfile: RuntimeDefault` on their pods. OpenShift's `restricted-v2`
# SCC denies `fsGroup: 1337` (namespace range starts at 1001270000). `anyuid`
# is MustRunAs on fsGroup so also denies 1337. `privileged` is RunAsAny on
# fsGroup which is what these stateless controllers actually need.
#
# We don't install `image-automation-controller`, `image-reflector-controller`,
# or `notification-controller` — they're not required by KAS.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: helm-controller-privileged
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: helm-controller
    namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kustomize-controller-privileged
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: kustomize-controller
    namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: source-controller-privileged
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: source-controller
    namespace: flux-system
