apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: obstruction-detector
  namespace: fleet-ops
  labels:
    app: obstruction-detector
    phase: phase-1
spec:
  source:
    type: Git
    git:
      uri: https://github.com/jeremyary/industrial-ai-showcase.git
      ref: main
    sourceSecret:
      name: git-source-secret
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: workloads/obstruction-detector/container/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: obstruction-detector:latest
  triggers:
    - type: ConfigChange
