apiVersion: apps/v1
kind: Deployment
metadata:
  name: obstruction-detector
  namespace: fleet-ops
  labels:
    app: obstruction-detector
    phase: phase-1
  annotations:
    image.openshift.io/triggers: |-
      [{"from":{"kind":"ImageStreamTag","name":"obstruction-detector:latest","namespace":"fleet-ops"},"fieldPath":"spec.template.spec.containers[?(@.name==\"obstruction-detector\")].image"}]
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: obstruction-detector
  template:
    metadata:
      labels:
        app: obstruction-detector
    spec:
      serviceAccountName: obstruction-detector
      containers:
        - name: obstruction-detector
          image: obstruction-detector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
              name: http
          env:
            - name: SERVICE_NAME
              value: obstruction-detector
            - name: LOG_LEVEL
              value: INFO
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: fleet-kafka-bootstrap.fleet-ops.svc:9092
            - name: FRAMES_TOPIC
              value: warehouse.cameras.aisle3
            - name: ALERTS_TOPIC
              value: fleet.safety.alerts
            - name: CONSUMER_GROUP
              value: obstruction-detector
            - name: AISLE_ID
              value: aisle-3
            - name: COSMOS_ENDPOINT_URL
              value: http://cosmos-reason.cosmos.svc.cluster.local:8000/v1/chat/completions
            - name: COSMOS_MODEL
              value: cosmos-reason-2
            - name: DWELL_FRAMES
              value: "2"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
