---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: showcase-console-backend
  namespace: fleet-ops
  labels:
    app: showcase-console-backend
    phase: phase-1
spec:
  source:
    type: Git
    git:
      uri: https://github.com/jeremyary/industrial-ai-showcase.git
      ref: main
    sourceSecret:
      name: git-source-secret
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: console/backend/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: showcase-console-backend:latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  triggers:
    - type: ConfigChange
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: showcase-console-frontend
  namespace: fleet-ops
  labels:
    app: showcase-console-frontend
    phase: phase-1
spec:
  source:
    type: Git
    git:
      uri: https://github.com/jeremyary/industrial-ai-showcase.git
      ref: main
    sourceSecret:
      name: git-source-secret
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: console/frontend/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: showcase-console-frontend:latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  triggers:
    - type: ConfigChange
