apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-dispatcher-config
  namespace: robot-edge
  labels:
    app: mission-dispatcher
data:
  # Companion SNO reaches hub Kafka via the TLS-passthrough Route exposed by
  # Strimzi on the `external` listener (port 9094 internally, 443 via the route).
  # Hub cluster: https://fleet-kafka-bootstrap-fleet-ops.apps.jary-qs-0323.7w5j.p1.openshiftapps.com
  kafka.bootstrap.servers: "fleet-kafka-bootstrap-fleet-ops.apps.jary-qs-0323.7w5j.p1.openshiftapps.com:443"
  kafka.security.protocol: "SSL"
  # Host VLA endpoint per ADR-026. Companion Fedora host has a macvlan-bridged
  # podman container at 10.0.0.74:8000 running openvla-server. macvtap-direct
  # VMs (our SNO) can reach macvlan-sibling containers on the same parent.
  vla.endpoint.url: "http://10.0.0.74:8000/act"
