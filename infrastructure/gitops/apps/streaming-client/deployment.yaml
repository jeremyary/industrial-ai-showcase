---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: isaacsim-streaming-client
  namespace: omni-streaming
---
# Electron's sandboxing doesn't play with OpenShift's random UID assignment.
# anyuid lets the AppImage launch without --no-sandbox doing its thing
# on a UID outside the project range. (The AppImage is also invoked with
# --no-sandbox as a belt-and-suspenders.)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: isaacsim-streaming-client-anyuid
  namespace: omni-streaming
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: isaacsim-streaming-client
    namespace: omni-streaming
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaacsim-streaming-client
  namespace: omni-streaming
  labels:
    app.kubernetes.io/name: isaacsim-streaming-client
    app.kubernetes.io/part-of: kit-appstreaming
  annotations:
    image.openshift.io/triggers: |-
      [{"from":{"kind":"ImageStreamTag","name":"isaacsim-streaming-client:latest","namespace":"omni-streaming"},"fieldPath":"spec.template.spec.containers[?(@.name==\"client\")].image"}]
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: isaacsim-streaming-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: isaacsim-streaming-client
    spec:
      serviceAccountName: isaacsim-streaming-client
      containers:
        - name: client
          image: isaacsim-streaming-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6080
              name: novnc
          env:
            # Points the AppImage at the Kit warm-pool session. Update this
            # when a new warm session spins up, or build a sidecar that
            # reads /api/stream/warm from the Console backend and kicks
            # the AppImage whenever the session ID changes. For now: set
            # this manually to whatever the console's warm session is.
            - name: KIT_SIGNALING_HOST
              value: streaming-kit-REPLACE-WITH-SESSION-ID.omni-streaming.svc.cluster.local
            - name: KIT_SIGNALING_PORT
              value: "49100"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          readinessProbe:
            tcpSocket:
              port: 6080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: isaacsim-streaming-client
  namespace: omni-streaming
  labels:
    app.kubernetes.io/name: isaacsim-streaming-client
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: isaacsim-streaming-client
  ports:
    - name: novnc
      port: 6080
      targetPort: 6080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: isaacsim-streaming-client
  namespace: omni-streaming
  labels:
    app.kubernetes.io/name: isaacsim-streaming-client
  annotations:
    haproxy.router.openshift.io/timeout: 1h
    haproxy.router.openshift.io/timeout-tunnel: 1h
spec:
  to:
    kind: Service
    name: isaacsim-streaming-client
  port:
    targetPort: novnc
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
