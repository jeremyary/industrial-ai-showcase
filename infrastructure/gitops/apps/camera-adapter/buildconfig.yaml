apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: camera-adapter
  namespace: fleet-ops
  labels:
    app: camera-adapter
    phase: phase-1
spec:
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: workloads/camera-adapter/container/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: camera-adapter:latest
  triggers: []
