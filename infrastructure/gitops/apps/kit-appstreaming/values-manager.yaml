# Values overlay for kit-appstreaming-manager 1.11.1 on OSD.
global:
  imagePullSecrets:
    - name: ngc-pull-secret

streaming:
  imagePullSecrets:
    - name: ngc-pull-secret
  serviceConfig:
    # Pin sessions into omni-streaming. _csp.Generic hardcodes its search
    # namespace to "omni-streaming" (nv/svc/streaming/_csp.py:65), so if
    # session_namespace is empty sessions land in a per-session ns and the
    # Manager's readiness check never finds their pods.
    session_namespace: "omni-streaming"
    # Phase 1 demo cap: one warm session, up to 3 concurrent if anybody else
    # watches simultaneously. L40S GPU budget is the real ceiling (Isaac Sim
    # is L40S-hungry per `docs/08-gpu-resource-planning.md`).
    session_capacity: 3
    session_check_ready: true
    backend_rmcp_url: "http://rmcp.omni-streaming.svc.cluster.local:80"
    # /resolve endpoint lives on the `resolver` service (sidecar to the
    # applications Deployment), not on `applications` itself.
    backend_applications_resolver_url: "http://resolver.omni-streaming.svc.cluster.local:80"
    # No CSP integration — on-prem/OSD deployment. Generic backend uses plain
    # Kubernetes primitives (Services + ClusterIP for session-to-manager comms).
    backend_csp_cls: "nv.svc.streaming._csp.Generic"
