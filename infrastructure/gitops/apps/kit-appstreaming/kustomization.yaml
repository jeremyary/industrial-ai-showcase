apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Checkpoint 1: namespace + NGC auth plumbing only. Subsequent checkpoints
# add memcached, Flux, and each KAS service in the order specified by
# NVIDIA's install docs.
resources:
  - namespace.yaml
  - vault-auth.yaml
  - vault-static-secret-ngc.yaml
  - ngc-pullsecret-render-job.yaml
  - default-sa-anyuid.yaml
  - session-companion.yaml
  - coturn.yaml
  - warehouse-scenario.yaml
