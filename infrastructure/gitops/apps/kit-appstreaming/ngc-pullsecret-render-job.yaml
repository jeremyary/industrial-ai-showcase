---
# Per the pattern in infrastructure/gitops/apps/platform/ngc-secrets/README.md.
# Renders two NGC-auth Secrets:
#   - ngc-pull-secret  (dockerconfigjson, for imagePullSecrets on KAS-spawned
#                       Kit pods + NVIDIA-owned KAS control-plane containers)
#   - ngc-omni-user    (generic, username=$oauthtoken + password=<key>, the
#                       form KAS Helm charts consume per NVIDIA's install docs)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ngc-pullsecret-render
  namespace: omni-streaming
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ngc-pullsecret-render
  namespace: omni-streaming
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ngc-pullsecret-render
  namespace: omni-streaming
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ngc-pullsecret-render
subjects:
  - kind: ServiceAccount
    name: ngc-pullsecret-render
    namespace: omni-streaming
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ngc-pullsecret-render
  namespace: omni-streaming
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: kit-appstreaming
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ngc-pullsecret-render
      containers:
        - name: render
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              for i in {1..30}; do
                if oc get secret ngc-api-key -o jsonpath='{.data.api_key}' >/dev/null 2>&1; then break; fi
                echo "waiting for ngc-api-key (iter $i)"; sleep 3
              done
              KEY=$(oc get secret ngc-api-key -o jsonpath='{.data.api_key}' | base64 -d)
              AUTH=$(printf '$oauthtoken:%s' "$KEY" | base64 -w0)
              CONF=$(printf '{"auths":{"nvcr.io":{"username":"$oauthtoken","password":"%s","auth":"%s"}}}' "$KEY" "$AUTH")
              oc create secret generic ngc-pull-secret \
                --type=kubernetes.io/dockerconfigjson \
                --from-literal=.dockerconfigjson="$CONF" \
                --dry-run=client -o yaml | oc apply -f -
              # KAS Helm charts expect a generic Secret with literal username
              # + password keys — NOT the dockerconfigjson format.
              oc create secret generic ngc-omni-user \
                --from-literal=username='$oauthtoken' \
                --from-literal=password="$KEY" \
                --dry-run=client -o yaml | oc apply -f -
              echo "rendered: ngc-pull-secret + ngc-omni-user"
