apiVersion: v1
kind: Namespace
metadata:
  name: openshift-logging
  labels:
    openshift.io/cluster-monitoring: "true"
  annotations:
    # Owned-by-us marker; the namespace pre-exists on this OSD cluster
    # (empty, SRE-created) so Argo CD adopts it rather than re-creating.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
