apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: warn-project-images
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mode: warn
  # Scope: future project-published images under our Quay org. No policy
  # enforcement yet; only emits admission warnings when an image from this
  # registry path is missing a valid Cosign signature. Graduates to
  # mode: enforce during Phase 1 once the first project image publishes.
  images:
    - glob: "quay.io/redhat-physical-ai-reference/**"
  authorities:
    - keyless:
        url: https://fulcio.sigstore.dev
        identities:
          - issuer: https://token.actions.githubusercontent.com
            subjectRegExp: ".*"
