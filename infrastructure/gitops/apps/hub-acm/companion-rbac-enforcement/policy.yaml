apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: companion-rbac-enforcement
  namespace: open-cluster-management-global-set
  annotations:
    policy.open-cluster-management.io/categories: AC Access Control
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rbac-warehouse-edge
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: mission-dispatcher
                  namespace: warehouse-edge
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: mission-dispatcher-edit
                  namespace: warehouse-edge
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: edit
                subjects:
                  - kind: ServiceAccount
                    name: mission-dispatcher
                    namespace: warehouse-edge
