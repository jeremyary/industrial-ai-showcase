apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Pre-sync steps required once per environment (see README.md):
#   1. Copy the cluster pull-secret into this namespace as
#      multiclusterhub-operator-pull-secret.
#   2. Create the thanos-object-storage secret (Thanos-format YAML
#      pointing at MinIO in obs-storage).
# Both secrets are imperative to keep credentials out of Git; all
# other resources (namespace, MultiClusterObservability CR) are
# reconciled here.
resources:
  - namespace.yaml
  - multiclusterobservability.yaml
