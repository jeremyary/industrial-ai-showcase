apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wms-stub
  namespace: fleet-ops
  labels:
    app: wms-stub
spec:
  podSelector:
    matchLabels:
      app: wms-stub
  policyTypes:
    - Ingress
    - Egress
  # Same Phase-1 permissive-egress pragma as fleet-manager (see that policy's comments).
  egress:
    - {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleet-ops
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - protocol: TCP
          port: 8082
