apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cosmos-reason-cache
  namespace: cosmos
  labels:
    app: cosmos-reason
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Cosmos-Reason1-7B weights + HF cache: ~30 GiB with room for variant tags.
      storage: 60Gi
  storageClassName: gp3
