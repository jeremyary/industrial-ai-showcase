apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault
  namespace: vla-training
spec:
  address: http://vault.vault.svc.cluster.local:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault
  namespace: vla-training
spec:
  vaultConnectionRef: vault
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vso-read
    serviceAccount: default
---
# MinIO credentials for DSPA object storage and pipeline steps
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: minio-credentials
  namespace: vla-training
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  vaultAuthRef: vault
  type: kv-v2
  mount: kv
  path: mlflow/s3
  destination:
    name: minio-credentials
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        MINIO_ROOT_USER:
          text: '{{ get .Secrets "MINIO_ROOT_USER" }}'
        MINIO_ROOT_PASSWORD:
          text: '{{ get .Secrets "MINIO_ROOT_PASSWORD" }}'
  refreshAfter: 1h
---
# Git credentials for BuildConfig source cloning
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: git-source-secret
  namespace: vla-training
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  vaultAuthRef: vault
  type: kv-v2
  mount: kv
  path: argocd/repo-creds
  destination:
    name: git-source-secret
    create: true
    overwrite: true
    type: kubernetes.io/basic-auth
    transformation:
      excludeRaw: true
      templates:
        username:
          text: git
        password:
          text: '{{ get .Secrets "token" }}'
  refreshAfter: 1h
---
# HuggingFace token for gated model downloads
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: hf-credentials
  namespace: vla-training
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  vaultAuthRef: vault
  type: kv-v2
  mount: kv
  path: vla-training/hf
  destination:
    name: hf-credentials
    create: true
    overwrite: true
  refreshAfter: 1h
