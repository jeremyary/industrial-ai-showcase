apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: vla-training
  namespace: vla-training
  labels:
    app: vla-training
    phase: phase-2
spec:
  source:
    type: Git
    git:
      uri: https://github.com/jeremyary/industrial-ai-showcase.git
      ref: main
    sourceSecret:
      name: git-source-secret
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: workloads/vla-training/container/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: vla-training:latest
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 16Gi
  triggers:
    - type: ConfigChange
