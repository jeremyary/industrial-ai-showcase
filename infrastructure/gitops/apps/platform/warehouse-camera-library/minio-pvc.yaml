apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: warehouse-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Phase-1 image library is ~1.5 MB. 5 GB leaves room for frame-variant
      # libraries (crate, boxes, person, partial) without resizing.
      storage: 5Gi
  storageClassName: gp3-csi
