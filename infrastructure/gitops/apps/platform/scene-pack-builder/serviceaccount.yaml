apiVersion: v1
kind: ServiceAccount
metadata:
  name: scene-pack-builder
  namespace: omniverse-nucleus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scene-pack-builder-anyuid
  namespace: omniverse-nucleus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: scene-pack-builder
    namespace: omniverse-nucleus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scene-pack-builder-secrets
  namespace: omniverse-nucleus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["nucleus-passwords"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scene-pack-builder-secrets
  namespace: omniverse-nucleus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scene-pack-builder-secrets
subjects:
  - kind: ServiceAccount
    name: scene-pack-builder
    namespace: omniverse-nucleus
