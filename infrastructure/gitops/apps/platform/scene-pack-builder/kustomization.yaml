apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: omniverse-nucleus

# Note: build with `--load-restrictor=LoadRestrictionsNone` so kustomize can
# read the canonical generator + topology sources from their `workloads/`
# homes instead of duplicating them here. ArgoCD picks this up via the
# Application's `spec.source.kustomize.loadRestrictions: LoadRestrictionsNone`.

resources:
  - serviceaccount.yaml
  - job.yaml

configMapGenerator:
  - name: scene-pack-builder-scripts
    files:
      - generate_overlay.py=../../../../../workloads/isaac-sim/scene-pack/generate_overlay.py
      - warehouse-topology.yaml=../../../../../workloads/warehouse/warehouse-topology.yaml

generatorOptions:
  disableNameSuffixHash: true
