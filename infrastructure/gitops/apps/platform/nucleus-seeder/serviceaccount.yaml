apiVersion: v1
kind: ServiceAccount
metadata:
  name: nucleus-seeder
  namespace: omniverse-nucleus
---
# Isaac Sim image entrypoint assumes UID 0; reuse the same anyuid grant
# pattern the existing `nucleus` SA uses.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nucleus-seeder-anyuid
  namespace: omniverse-nucleus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: nucleus-seeder
    namespace: omniverse-nucleus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nucleus-seeder-secrets
  namespace: omniverse-nucleus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["nucleus-passwords"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nucleus-seeder-secrets
  namespace: omniverse-nucleus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nucleus-seeder-secrets
subjects:
  - kind: ServiceAccount
    name: nucleus-seeder
    namespace: omniverse-nucleus
