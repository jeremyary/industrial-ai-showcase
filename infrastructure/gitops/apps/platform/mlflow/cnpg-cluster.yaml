apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mlflow-db
  namespace: mlflow
spec:
  instances: 1
  storage:
    size: 5Gi
    storageClass: gp3
  bootstrap:
    initdb:
      database: mlflow
      owner: mlflow
  # CNPG auto-generates the Secret mlflow-db-app with keys:
  #   username, password, host, port, dbname, uri, jdbc-uri.
  # MLflow CR references the 'uri' key via backendStoreUriFrom.
