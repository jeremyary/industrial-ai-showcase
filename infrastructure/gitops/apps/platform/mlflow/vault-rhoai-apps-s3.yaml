# RHOAI places the MLflow pod in redhat-ods-applications (its own managed
# namespace), so the S3 envFrom Secret must exist there. We project the
# same Vault KV path into that namespace via a separate VaultAuth +
# VaultStaticSecret pair. The default ServiceAccount in
# redhat-ods-applications has the minimum privileges VSO needs for
# kubernetes-auth (nothing special required beyond the cluster-wide
# vso-read role bound to any SA in any namespace).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault
  namespace: redhat-ods-applications
spec:
  address: http://vault.vault.svc.cluster.local:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault
  namespace: redhat-ods-applications
spec:
  vaultConnectionRef: vault
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vso-read
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: mlflow-s3-credentials
  namespace: redhat-ods-applications
spec:
  vaultAuthRef: vault
  type: kv-v2
  mount: kv
  path: mlflow/s3
  destination:
    name: mlflow-s3-credentials
    create: true
    overwrite: true
  refreshAfter: 1h
