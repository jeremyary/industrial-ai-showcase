apiVersion: batch/v1
kind: Job
metadata:
  name: mlflow-bucket-init
  namespace: mlflow
  annotations:
    # Run after the ObjectStore is up; Argo CD sync-wave 2 gives us
    # that ordering (ObjectStore + secrets in default wave 0).
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local https://minio.mlflow.svc.cluster.local \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --insecure; do
                echo "waiting for minio endpoint..."
                sleep 5
              done
              mc mb --ignore-existing local/mlflow-artifacts --insecure
              mc anonymous set none local/mlflow-artifacts --insecure
              echo "bucket ready"
          env:
            - name: MINIO_ROOT_USER
              value: mlflow-root
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
