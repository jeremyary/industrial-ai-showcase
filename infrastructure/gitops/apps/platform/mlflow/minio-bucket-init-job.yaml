apiVersion: batch/v1
kind: Job
metadata:
  name: mlflow-bucket-init
  namespace: mlflow
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio.mlflow.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio endpoint..."
                sleep 5
              done
              mc mb --ignore-existing local/mlflow-artifacts
              echo "bucket ready"
          env:
            # OpenShift restricted SCC runs this container with an
            # arbitrary non-root UID; the default HOME (/) is read-only
            # to that UID, so mc's config-dir (~/.mc) can't be created.
            # Redirect HOME to the writable /tmp so mc config lands there.
            - name: HOME
              value: /tmp
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
