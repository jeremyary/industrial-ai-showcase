apiVersion: mlflow.opendatahub.io/v1
kind: MLflow
metadata:
  name: mlflow
  annotations:
    # Reconcile after the backend (CNPG + MinIO + bucket) is up.
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  workers: 1
  serveArtifacts: true
  # Postgres metadata store via CNPG. The mlflow-db-app Secret is
  # auto-generated by CNPG and contains a ready-to-use 'uri' key.
  backendStoreUriFrom:
    name: mlflow-db-app
    key: uri
  # Model Registry shares the same Postgres DB (D5 in the plan).
  registryStoreUriFrom:
    name: mlflow-db-app
    key: uri
  # S3 artifact storage via MinIO.
  artifactsDestination: s3://mlflow-artifacts/
  env:
    - name: MLFLOW_S3_ENDPOINT_URL
      value: https://minio.mlflow.svc.cluster.local
    # MinIO AIStor uses a self-signed cert by default; tell MLflow's
    # S3 SDK to skip verification for cluster-internal traffic.
    - name: MLFLOW_S3_IGNORE_TLS
      value: "true"
  envFrom:
    - secretRef:
        name: mlflow-s3-credentials
