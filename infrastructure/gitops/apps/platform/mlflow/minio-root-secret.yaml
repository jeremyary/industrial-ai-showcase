# PLACEHOLDER credentials for Phase 0. Moving to a Vault-sourced
# ExternalSecret is a Session 08 deliverable (security baseline).
# The ObjectStore references this Secret's config.env key; MLflow
# uses the AWS_* keys from mlflow-s3-credentials (same values,
# different Secret shape).
apiVersion: v1
kind: Secret
metadata:
  name: minio-root
  namespace: mlflow
type: Opaque
stringData:
  # MinIO AIStor expects shell-export-style config.env.
  config.env: |
    export MINIO_ROOT_USER=mlflow-root
    export MINIO_ROOT_PASSWORD=phase-0-placeholder-rotate-in-s08
