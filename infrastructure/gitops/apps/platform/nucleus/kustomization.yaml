apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Namespace + SA + SCC grant
  - namespace.yaml
  - serviceaccount.yaml
  - scc-anyuid-binding.yaml
  # Storage
  - pvc.yaml
  # Config
  - configmap.yaml
  - saml-configmap.yaml
  # Secrets — placeholder password Secret (Part D Vault-ifies it);
  # crypto-secrets generated by pre-sync Job below (Part D Vault-ifies it);
  # NGC pull secret via Vault → dockerconfigjson render Job
  - nucleus-passwords-secret.yaml
  - crypto-secrets-gen-job.yaml
  - vault-connection.yaml
  - vault-auth.yaml
  - vault-static-secret-ngc.yaml
  - ngc-pullsecret-render-job.yaml
  # Services (12)
  - service-api.yaml
  - service-auth.yaml
  - service-discovery.yaml
  - service-lft.yaml
  - service-lft-lb.yaml
  - service-log-processor.yaml
  - service-monpx.yaml
  - service-navigator.yaml
  - service-resolver-cache.yaml
  - service-search.yaml
  - service-tagging.yaml
  - service-thumbnails.yaml
  # Ingress
  - routes.yaml
