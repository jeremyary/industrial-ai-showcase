apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Namespace + SA + SCC grant
  - namespace.yaml
  - serviceaccount.yaml
  - scc-anyuid-binding.yaml
  # Storage
  - pvc.yaml
  # Config
  - configmap.yaml
  - saml-configmap.yaml
  # Secrets — nucleus-passwords + crypto-secrets rendered from Vault via VSS
  # (seeded once per cluster — see README.md). NGC pull-secret: VSS reads
  # kv/ngc/api-key, Job transforms to dockerconfigjson.
  - vault-connection.yaml
  - vault-auth.yaml
  - vault-static-secret-passwords.yaml
  - vault-static-secret-crypto.yaml
  - vault-static-secret-ngc.yaml
  - ngc-pullsecret-render-job.yaml
  # Services (12)
  - service-api.yaml
  - service-auth.yaml
  - service-discovery.yaml
  - service-lft.yaml
  - service-lft-lb.yaml
  - service-log-processor.yaml
  - service-monpx.yaml
  - service-navigator.yaml
  - service-resolver-cache.yaml
  - service-search.yaml
  - service-tagging.yaml
  - service-thumbnails.yaml
  # Ingress
  - routes.yaml
  # NetworkPolicy (default-deny + explicit allowlists)
  - networkpolicy.yaml
  # Service Mesh — PeerAuthentication PERMISSIVE (namespace joins the
  # default Istio revision via the istio.io/rev label on the Namespace)
  - peerauthentication.yaml
