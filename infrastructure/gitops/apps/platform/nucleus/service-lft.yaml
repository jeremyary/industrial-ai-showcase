---
# Source: omniverse-nucleus/templates/services/lft.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nucleus-lft
  namespace: omniverse-nucleus
  labels:
    app: nucleus-lft
    app.kubernetes.io/part-of: omniverse-nucleus
    app.kubernetes.io/version: "2023.2.9"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nucleus-lft
  template:
    metadata:
      labels:
        app: nucleus-lft
    spec:
      serviceAccountName: nucleus
      imagePullSecrets:
        - name: ngc-pull-secret
      containers:
        - name: nucleus-lft
          image: nvcr.io/nvidia/omniverse/nucleus-lft:1.14.53
          env:
            - name: ACCEPT_EULA
              value: "1"
            - name: SERVER_IP_OR_HOST
              value: nucleus-api
            - name: OMNI_LFT_AUTH_PUBLIC_KEY
              value: /omni/secrets/jwt_pubkey.pub
            - name: OMNI_LFT_COMPRESSION
              value: "0"
            - name: OMNI_LFT_STRUCTURED_LOGGING
              value: "0"
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 250m
              memory: 512Mi
          ports:
            - containerPort: 3030
          volumeMounts:
            - name: data
              mountPath: /omni/log
              subPath: log/lft
            - name: data
              mountPath: /omni/data
              subPath: data
            - name: crypto-secrets
              mountPath: /omni/secrets/jwt_pubkey.pub
              subPath: auth_root_of_trust_pub
              readOnly: true
            - name: crypto-secrets
              mountPath: /omni/secrets/lft_salt
              subPath: lft_salt
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nucleus-data
        - name: crypto-secrets
          secret:
            secretName: crypto-secrets
