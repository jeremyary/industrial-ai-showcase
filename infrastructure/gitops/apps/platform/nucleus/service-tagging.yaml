---
# Source: omniverse-nucleus/templates/services/tagging.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nucleus-tagging
  namespace: omniverse-nucleus
  labels:
    app: nucleus-tagging
    app.kubernetes.io/part-of: omniverse-nucleus
    app.kubernetes.io/version: "2023.2.9"
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: nucleus-tagging
  template:
    metadata:
      labels:
        app: nucleus-tagging
    spec:
      serviceAccountName: nucleus
      imagePullSecrets:
        - name: ngc-pull-secret
      containers:
        - name: nucleus-tagging
          image: nvcr.io/nvidia/omniverse/nucleus-tagging:3.1.35
          env:
            - name: ACCEPT_EULA
              value: "1"
            - name: OV_HOST_NAME
              value: ""
            - name: OV_SERVICE_BIND_HOST
              value: 0.0.0.0
            - name: OV_SERVICE_BIND_PORT
              value: "3020"
            - name: OV_INSTANCE_NAME
              value: "my_omniverse"
            - name: OV_USERNAME
              value: tags_service
            - name: OV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nucleus-passwords
                  key: service-password
            - name: OV_MEMORY_LIMIT
              value: "2048"
            - name: OV_MEMORY_RESERVE
              value: "256"
            - name: OV_CPU_LIMIT
              value: "1"
            - name: OV_CPU_RESERVE
              value: "0.25"
            - name: OV_REGENERATE_DB
              value: "0"
            - name: OV_UPDATE_TAG_FORMAT_1_0
              value: "0"
            - name: OV_STACK_PROMETHEUS_PORT
              value: "2000"
            - name: OV_LOGFILE
              value: ""
            - name: OV_LOGGING_LEVEL
              value: INFO
            - name: OV_STORAGE_BACKEND
              value: sqlite_backend
            - name: OV_STORAGE_BACKEND_CONFIG
              value: '{"defrag_interval": 86400, "storage_location": "/omni/data/Tagging.db"}'
            - name: SQLITE_TMPDIR
              value: /omni/temp
            - name: SERVICE_AUTH_PUBLIC_KEY
              value: /omni/secrets/SERVICE_AUTH_PUBLIC_KEY
            - name: SERVICE_STRUCTURED_LOGGING
              value: "0"
            - name: WS_MAX_HTTP_LINE
              value: "20000"
            - name: SERVICE_DISCOVERY_URL
              value: ws://nucleus-discovery:3333
            - name: SERVICE_DEPLOYMENTS_LOOKUP
              value: internal
            - name: OV_SERVICE_DISCOVERY_TOKEN_FILE
              value: /omni/secrets/SERVICE_DISCOVERY_TOKEN
            - name: OV_SERVICE_DEPLOYMENTS
              value: |
                reg:
                  - name: external
                    transport:
                      type: sows
                      params:
                        host: nucleus.apps.jary-qs-0323.7w5j.p1.openshiftapps.com
                        port: 80
                        path: /omni/tagging
                  - name: internal
                    transport:
                      type: sows
                      params:
                        host: nucleus-tagging
                        port: 3020
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 3020
          readinessProbe:
            tcpSocket:
              port: 3020
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3020
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /omni/data
              subPath: tags-db
            - name: data
              mountPath: /omni/log
              subPath: log/tagging
            - name: data
              mountPath: /omni/temp
              subPath: tmp/tagging
            - name: crypto-secrets
              mountPath: /omni/secrets/SERVICE_DISCOVERY_TOKEN
              subPath: svc_reg_token
              readOnly: true
            - name: crypto-secrets
              mountPath: /omni/secrets/SERVICE_AUTH_PUBLIC_KEY
              subPath: auth_root_of_trust_pub
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nucleus-data
        - name: crypto-secrets
          secret:
            secretName: crypto-secrets
