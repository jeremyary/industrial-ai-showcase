apiVersion: v1
kind: Namespace
metadata:
  name: omniverse-nucleus
  annotations:
    # NVIDIA Nucleus images run as root (per /root/eula.sh entrypoint).
    # OpenShift would otherwise auto-sync this namespace's PSA labels to
    # `restricted` based on SCC-assigned workloads; we disable that sync and
    # pin PSA to `privileged` here. The anyuid SCC grant on the `nucleus`
    # SA (see scc-anyuid-binding.yaml) still handles OpenShift-side policy.
    security.openshift.io/scc.podSecurityLabelSync: "false"
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    openshift.io/cluster-monitoring: "true"
    # Service Mesh 3 sidecar injection — DISABLED pending hub-wide CA drift fix.
    # The `default` revision's istio-ca-secret (signing cert) rotated but
    # istio-ca-root-cert ConfigMaps cluster-wide were not re-propagated. Proxies
    # can't verify istiod's certs. This is a pre-existing hub issue that
    # affects every mesh-enrolled namespace, not a Nucleus-specific problem.
    # Re-enable by setting: istio.io/rev: default  once the hub mesh CA is
    # reconciled (either by regenerating istio-ca-root-cert from the current
    # istio-ca-secret or by forcing istiod to re-bootstrap). See the
    # PeerAuthentication manifest + Part-E commit — the code remains correct.
