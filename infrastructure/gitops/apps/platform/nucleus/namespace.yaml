apiVersion: v1
kind: Namespace
metadata:
  name: omniverse-nucleus
  annotations:
    # NVIDIA Nucleus images run as root (per /root/eula.sh entrypoint).
    # OpenShift would otherwise auto-sync this namespace's PSA labels to
    # `restricted` based on SCC-assigned workloads; we disable that sync and
    # pin PSA to `privileged` here. The anyuid SCC grant on the `nucleus`
    # SA (see scc-anyuid-binding.yaml) still handles OpenShift-side policy.
    security.openshift.io/scc.podSecurityLabelSync: "false"
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    openshift.io/cluster-monitoring: "true"
    # Service Mesh 3 sidecar injection — joins the `default` Istio revision
    # in istio-system. Pods get an istio-proxy sidecar on next restart and
    # pick up mTLS (intra-mesh pairs) + observability.
    istio.io/rev: default
