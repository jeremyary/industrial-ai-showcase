apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: crypto-secrets
  namespace: omniverse-nucleus
# Replaces the crypto-secrets-gen-job (which generated one-shot in the
# cluster). Keypairs + salts + discovery token now live in Vault at
# kv/nucleus/crypto with the 7 keys matching the chart's subPath mounts:
#   auth_root_of_trust_pri / _pub, auth_root_of_trust_lt_pri / _lt_pub,
#   svc_reg_token, pwd_salt, lft_salt
#
# Initial seed: see README.md → "One-time setup → crypto-secrets".
# Rotating a key is `vault kv put` + bounce affected pods.
spec:
  vaultAuthRef: vault
  type: kv-v2
  mount: kv
  path: nucleus/crypto
  destination:
    name: crypto-secrets
    create: true
    overwrite: true
  refreshAfter: 1h
