# Grants the anyuid SCC to the `nucleus` ServiceAccount only — not to any
# other workload in the namespace. Scoped RoleBinding is the reconcilable
# equivalent of `oc adm policy add-scc-to-user anyuid -z nucleus`.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nucleus-anyuid
  namespace: omniverse-nucleus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: nucleus
    namespace: omniverse-nucleus
