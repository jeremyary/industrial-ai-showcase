---
# ServiceAccount + Role for the render Job.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ngc-pullsecret-render
  namespace: omniverse-nucleus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ngc-pullsecret-render
  namespace: omniverse-nucleus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ngc-pullsecret-render
  namespace: omniverse-nucleus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ngc-pullsecret-render
subjects:
  - kind: ServiceAccount
    name: ngc-pullsecret-render
    namespace: omniverse-nucleus
---
# Pre-sync Job that reads the VSS-rendered ngc-api-key Secret and produces a
# dockerconfigjson Secret suitable for imagePullSecrets. Idempotent — re-runs
# on every Argo sync; uses oc apply under the hood.
apiVersion: batch/v1
kind: Job
metadata:
  name: ngc-pullsecret-render
  namespace: omniverse-nucleus
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: omniverse-nucleus
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ngc-pullsecret-render
      containers:
        - name: render
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              # Wait up to 90s for VSS to populate ngc-api-key
              for i in {1..30}; do
                if oc get secret ngc-api-key -o jsonpath='{.data.api_key}' >/dev/null 2>&1; then break; fi
                echo "waiting for ngc-api-key (iter $i)"; sleep 3
              done
              KEY=$(oc get secret ngc-api-key -o jsonpath='{.data.api_key}' | base64 -d)
              AUTH=$(printf '$oauthtoken:%s' "$KEY" | base64 -w0)
              CONF=$(printf '{"auths":{"nvcr.io":{"username":"$oauthtoken","password":"%s","auth":"%s"}}}' "$KEY" "$AUTH")
              oc create secret generic ngc-pull-secret \
                --type=kubernetes.io/dockerconfigjson \
                --from-literal=.dockerconfigjson="$CONF" \
                --dry-run=client -o yaml | oc apply -f -
              echo "ngc-pull-secret rendered"
