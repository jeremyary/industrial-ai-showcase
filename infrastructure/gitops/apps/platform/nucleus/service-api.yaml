      port: 3006
      targetPort: 3006
    - name: api-lft
      port: 3007
      targetPort: 3007
---
# Source: omniverse-nucleus/templates/services/api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nucleus-api
  namespace: omniverse-nucleus
  labels:
    app: nucleus-api
    app.kubernetes.io/part-of: omniverse-nucleus
    app.kubernetes.io/version: "2023.2.9"
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: nucleus-api
  template:
    metadata:
      labels:
        app: nucleus-api
    spec:
      serviceAccountName: nucleus
      imagePullSecrets:
        - name: ngc-pull-secret
      containers:
        - name: nucleus-api
          image: nvcr.io/nvidia/omniverse/nucleus-api:1.14.53
          envFrom:
            - configMapRef:
                name: nucleus-config
          env:
            - name: OMNI_INSTANCE
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: INSTANCE_NAME
            - name: OMNI_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nucleus-passwords
                  key: master-password
            - name: OMNI_AUTH_JWT_PUBKEY
              value: /omni/secrets/jwt_pubkey.pub
            - name: OMNI_LFT_ADDRESS
              value: "http://nucleus.apps.jary-qs-0323.7w5j.p1.openshiftapps.com/omni/lft"
            - name: OMNI_LFT_THRESHOLD
              value: "1024"
            - name: OMNI_CONTENT_RAM_SZ
              value: "6"
            - name: OMNI_NUCLEUS_CORE_THREADS_COUNT
              value: "4"
            - name: OMNI_LAUNCHER_PROMETHEUS_PORT
              value: "9500"
            - name: OMNI_ENABLE_TEST_USER
              value: "0"
            - name: OMNI_S3_RESOLVER_CACHE
              value: "http://nucleus-resolver-cache:8891"
            - name: OMNI_DEFAULT_S3_PROXY_CACHE
              value: "http://nucleus-resolver-cache:8891"
            - name: OMNI_CRASHENABLEUPLOADING
              value: "0"
            - name: OMNI_CRASHREPORTERENABLED
              value: "0"
            - name: OMNI_ENABLE_MOUNT_RESOLVER_LOGGING
              value: "0"
            - name: OMNI_VERSIONING
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: ENABLE_VERSIONING
            - name: OMNI_OO_MODE
              value: "0"
            - name: OMNI_CONTENT_MOUNT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_MOUNT_ENABLE
            - name: OMNI_S3_MOUNT_PATH
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_MOUNT_TARGET
            - name: OMNI_S3_SECURE
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_SECURE
            - name: OMNI_S3_HOST
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_SOURCE
            - name: OMNI_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_BUCKET
            - name: OMNI_S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_SOURCE_REGION
            - name: OMNI_CONTENT_MOUNT_BUCKET_USE_CREDENTIALS
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_USE_CREDENTIALS
            - name: OMNI_S3_ACCESS_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_BUCKET_ACCESS_KEY_ID
            - name: OMNI_S3_SECRET_ACCESS_KEY
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_BUCKET_SECRET_ACCESS_KEY
            - name: OMNI_S3_RELAXED_XML_PARSING
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: REFERENCE_CONTENT_NON_COMPLIANT_XML_SCHEMA
            - name: OMNI_STRUCTURED_LOGGING
              valueFrom:
                configMapKeyRef:
                  name: nucleus-config
                  key: ENABLE_STRUCTURED_LOGGING
            - name: OMNI_MAX_IN_FLIGHT_REQUESTS
              value: "0"
            - name: OMNI_NUCLEUS_DISCOVERY_HOST
              value: nucleus-discovery
            - name: OMNI_NUCLEUS_DISCOVERY_TOKEN_FILE
              value: /omni/secrets/discovery_token
            - name: OMNI_NUCLEUS_SERVICE_AUTH_DEPLOYMENT_LOOKUP
              value: internal
            - name: OMNI_NUCLEUS_DISCOVERY_SERVICE_DEPLOYMENTS
              value: |
                reg:
                  - name: external
                    transport:
                      type: connlib
                      params:
                        url: ws://nucleus.apps.jary-qs-0323.7w5j.p1.openshiftapps.com/omni/api
                  - name: internal
                    transport:
                      type: connlib
                      params:
                        url: ws://nucleus-api:3009
          resources:
            limits:
              cpu: "4"
              memory: 8Gi
            requests:
              cpu: 500m
              memory: 1Gi
          ports:
            - containerPort: 3009
            - containerPort: 3106
            - containerPort: 3006
            - containerPort: 3007
          readinessProbe:
            tcpSocket:
              port: 3009
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3009
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /omni/data
              subPath: data
            - name: data
              mountPath: /omni/log
              subPath: log/api
            - name: data
              mountPath: /omni/scratch-meta-dump
              subPath: scratch/meta-dump
            - name: crypto-secrets
              mountPath: /omni/secrets/jwt_pubkey.pub
              subPath: auth_root_of_trust_pub
              readOnly: true
            - name: crypto-secrets
              mountPath: /omni/secrets/discovery_token
              subPath: svc_reg_token
              readOnly: true
            - name: crypto-secrets
              mountPath: /omni/secrets/lft_salt
              subPath: lft_salt
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nucleus-data
        - name: crypto-secrets
          secret:
            secretName: crypto-secrets
