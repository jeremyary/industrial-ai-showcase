---
# ServiceAccount + RBAC for the crypto-gen Job.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nucleus-crypto-gen
  namespace: omniverse-nucleus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nucleus-crypto-gen
  namespace: omniverse-nucleus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nucleus-crypto-gen
  namespace: omniverse-nucleus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nucleus-crypto-gen
subjects:
  - kind: ServiceAccount
    name: nucleus-crypto-gen
    namespace: omniverse-nucleus
---
# Generates the `crypto-secrets` Secret (JWT keypairs, discovery token, salt)
# that Nucleus services mount at /omni/secrets/*. Idempotent: if the Secret
# already exists, the Job exits 0 without changing anything so keypairs
# persist across Argo re-syncs and pod restarts (existing tokens stay valid).
#
# TODO(ADR-024 Part D): migrate to a VaultStaticSecret reading
# kv/nucleus/crypto so the material lives in Vault, not in a one-time-
# generated K8s Secret. Part B keeps this self-contained so the chart reaches
# Ready without pre-seeded Vault paths. See KNOWN-ISSUES.md.
apiVersion: batch/v1
kind: Job
metadata:
  name: nucleus-crypto-gen
  namespace: omniverse-nucleus
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-10"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: omniverse-nucleus
    spec:
      restartPolicy: OnFailure
      serviceAccountName: nucleus-crypto-gen
      containers:
        - name: gen
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              if oc get secret crypto-secrets >/dev/null 2>&1; then
                echo "crypto-secrets already exists — preserving keypairs"
                exit 0
              fi
              command -v openssl >/dev/null || dnf install -y openssl >/dev/null 2>&1
              WORK=$(mktemp -d)
              trap 'rm -rf "$WORK"' EXIT
              # Short-term JWT keypair
              openssl genrsa 4096 2>/dev/null > "$WORK/auth_root_of_trust.pem"
              openssl rsa -pubout < "$WORK/auth_root_of_trust.pem" 2>/dev/null > "$WORK/auth_root_of_trust.pub"
              # Long-term JWT keypair
              openssl genrsa 4096 2>/dev/null > "$WORK/auth_root_of_trust_lt.pem"
              openssl rsa -pubout < "$WORK/auth_root_of_trust_lt.pem" 2>/dev/null > "$WORK/auth_root_of_trust_lt.pub"
              # Discovery service registration token (256 hex chars)
              dd if=/dev/urandom bs=1 count=128 2>/dev/null | od -An -tx1 | tr -d ' \n' | head -c 256 > "$WORK/svc_reg_token"
              # Password salt
              dd if=/dev/urandom bs=1 count=16 2>/dev/null | od -An -tx1 | tr -d ' \n' > "$WORK/pwd_salt"
              # Assemble into one Secret. Keys map to the env-var paths in the
              # auth Deployment: /omni/secrets/<KEY>
              oc create secret generic crypto-secrets \
                --from-file=SERVICE_PRIVATE_KEY="$WORK/auth_root_of_trust.pem" \
                --from-file=SERVICE_PUBLIC_KEY="$WORK/auth_root_of_trust.pub" \
                --from-file=SERVICE_PRIVATE_KEY_LONG_TERM_TOKENS="$WORK/auth_root_of_trust_lt.pem" \
                --from-file=SERVICE_PUBLIC_KEY_LONG_TERM_TOKENS="$WORK/auth_root_of_trust_lt.pub" \
                --from-file=SERVICE_DISCOVERY_TOKEN="$WORK/svc_reg_token" \
                --from-file=SERVICE_SALT="$WORK/pwd_salt"
              echo "crypto-secrets created"
