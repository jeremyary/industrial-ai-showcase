apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: nucleus-passwords
  namespace: omniverse-nucleus
# Replaces the committed plain Secret. Seeded manually via
#   oc exec -n vault vault-0 -- vault kv put kv/nucleus/passwords \
#     master-password=<...> service-password=<...>
# Rotation is: `vault kv put` with new values + restart Nucleus auth pod.
spec:
  vaultAuthRef: vault
  type: kv-v2
  mount: kv
  path: nucleus/passwords
  destination:
    name: nucleus-passwords
    create: true
    overwrite: true
  refreshAfter: 1h
