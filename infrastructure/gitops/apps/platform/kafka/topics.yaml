# Session-18 topics (ADR-027): camera frames federated from companion,
# safety alerts emitted by obstruction-detector, consumed by fleet-manager.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: warehouse-cameras-aisle3
  namespace: fleet-ops
  labels:
    strimzi.io/cluster: fleet
spec:
  topicName: warehouse.cameras.aisle3
  # Single partition: a camera is a single-writer / single-logical-consumer
  # stream; ordering matters (empty → obstructed transitions) more than
  # parallel consumption.
  partitions: 1
  replicas: 3
  config:
    # 1 MB: 1920x1080 JPEG base64 envelope is ~870 KB.
    max.message.bytes: "1048576"
    # Short retention — frames are ephemeral telemetry, not audit data.
    # Fleet-wide recordings land in a separate S3 archive, not Kafka.
    retention.ms: 300000
    cleanup.policy: delete
    compression.type: producer
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: warehouse-cameras-commands
  namespace: fleet-ops
  labels:
    strimzi.io/cluster: fleet
spec:
  topicName: warehouse.cameras.commands
  partitions: 1
  replicas: 3
  config:
    retention.ms: 300000
    cleanup.policy: delete
    compression.type: producer
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: fleet-safety-alerts
  namespace: fleet-ops
  labels:
    strimzi.io/cluster: fleet
spec:
  topicName: fleet.safety.alerts
  # Alerts are infrequent; partitions=3 is ample for multi-consumer fan-out
  # (fleet-manager + console event-stream + future audit sink).
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    cleanup.policy: delete
    compression.type: producer
