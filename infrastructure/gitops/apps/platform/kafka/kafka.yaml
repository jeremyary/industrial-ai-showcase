apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: fleet
  namespace: fleet-ops
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: "4.1"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      # Phase 1 external listener — companion SNO reaches hub Kafka via
      # TLS-passthrough OpenShift Routes until MirrorMaker2 lands in Phase 2.
      # No client auth; companion trusts the cluster CA. Phase 2 adds mTLS
      # client auth + a KafkaUser per consumer alongside Service Mesh hardening.
      - name: external
        port: 9094
        type: route
        tls: true
    config:
      # Replication & durability tuned for a 3-broker demo cluster.
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # Conservative retention: 7 days wall-clock or 1 GB per partition.
      log.retention.hours: 168
      log.segment.bytes: 1073741824
      log.retention.bytes: 1073741824
      # Trace propagation requires header preservation.
      auto.create.topics.enable: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
