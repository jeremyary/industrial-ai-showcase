apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: vault
---
# Allows Vault to call TokenReview during Kubernetes auth method setup
# so client SA tokens from other namespaces can be validated.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-tokenreview
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
