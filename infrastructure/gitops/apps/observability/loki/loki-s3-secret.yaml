# LokiStack expects a Secret with S3-flavored keys in the SAME namespace
# as the LokiStack CR. Credentials point at the obs-storage MinIO.
# Phase 0 shortcut: credentials duplicated here (MinIO is in obs-storage,
# this Secret is in openshift-logging). Session 08 replaces with Reflector-
# synced or ExternalSecret-sourced values.
apiVersion: v1
kind: Secret
metadata:
  name: loki-s3
  namespace: openshift-logging
type: Opaque
stringData:
  access_key_id: obs-root
  access_key_secret: phase-0-placeholder-rotate-in-s08
  bucketnames: loki-logs
  endpoint: http://minio.obs-storage.svc.cluster.local:9000
  region: us-east-1
