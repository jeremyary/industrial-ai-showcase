apiVersion: batch/v1
kind: Job
metadata:
  name: obs-bucket-init
  namespace: obs-storage
  annotations:
    # Run as an Argo CD PostSync hook so the Job is tracked only during
    # sync, then deleted on success. Avoids ongoing OutOfSync drift once
    # the Job's ttlSecondsAfterFinished expires.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio.obs-storage.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio endpoint..."
                sleep 5
              done
              mc mb --ignore-existing local/loki-logs
              echo "bucket loki-logs ready"
          env:
            - name: HOME
              value: /tmp
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: obs-minio-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obs-minio-credentials
                  key: AWS_SECRET_ACCESS_KEY
