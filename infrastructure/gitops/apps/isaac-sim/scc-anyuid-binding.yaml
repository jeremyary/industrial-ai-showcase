# Isaac Sim container runs as root — grant anyuid SCC to the service account.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: isaac-sim-anyuid
  namespace: isaac-sim
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: isaac-sim
    namespace: isaac-sim
