apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: build with `--load-restrictor=LoadRestrictionsNone` so kustomize can
# read scenario scripts from their canonical workloads/ location.

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - scc-anyuid-binding.yaml
  - vault-auth.yaml
  - vault-static-secret-ngc.yaml
  - vault-static-secret-nucleus.yaml
  - ngc-pullsecret-render-job.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml

configMapGenerator:
  - name: isaac-sim-scenarios
    namespace: isaac-sim
    files:
      - warehouse_baseline.py=../../../../workloads/isaac-sim/scenarios/warehouse_baseline.py
      - viewport_mjpeg.py=../../../../workloads/isaac-sim/scenarios/viewport_mjpeg.py

generatorOptions:
  disableNameSuffixHash: true
