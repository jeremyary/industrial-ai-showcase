apiVersion: config.openshift.io/v1
kind: ClusterImagePolicy
metadata:
  name: companion-ocp-component-images
# Adds enforce-mode signature verification for the OCP component images
# scope (quay.io/openshift-release-dev/ocp-v4.0-art-dev). The
# platform-shipped `openshift` ClusterImagePolicy only covers
# quay.io/openshift-release-dev/ocp-release (the release manifest);
# individual component images live at -art-dev and are signed with the
# same Red Hat release-signing key. This adds real enforcement for
# operator operand images that CVO pulls out of the release payload.
#
# registry.redhat.io product images use a different (GPG) signing
# chain and are deferred to Phase 1 once signing identity and Vault
# key material are locked per ADR-016 / ADR-023.
spec:
  scopes:
    - quay.io/openshift-release-dev/ocp-v4.0-art-dev
  policy:
    rootOfTrust:
      policyType: PublicKey
      publicKey:
        # Identical to the platform `openshift` CIP — the Red Hat
        # release-signing public key. Embedded inline so this manifest
        # is self-contained; any future rotation of the Red Hat key
        # would land in both the platform CIP (by payload update) and
        # here (by editing this file).
        keyData: 
    signedIdentity:
      matchPolicy: MatchRepoDigestOrExact
