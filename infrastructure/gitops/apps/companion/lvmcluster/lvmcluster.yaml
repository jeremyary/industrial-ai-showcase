apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: companion-storage
  namespace: openshift-storage
spec:
  storage:
    deviceClasses:
      - name: vg1
        default: true
        fstype: xfs
        deviceSelector:
          paths:
            - /dev/vdb
          forceWipeDevicesAndDestroyAllData: false
        thinPoolConfig:
          name: thin-pool-1
          sizePercent: 90
          overprovisionRatio: 10
