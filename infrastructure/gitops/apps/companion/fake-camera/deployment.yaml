apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-camera
  namespace: warehouse-edge
  labels:
    app: fake-camera
    phase: phase-1
  annotations:
    image.openshift.io/triggers: |-
      [{"from":{"kind":"ImageStreamTag","name":"fake-camera:latest","namespace":"warehouse-edge"},"fieldPath":"spec.template.spec.containers[?(@.name==\"fake-camera\")].image"}]
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: fake-camera
  template:
    metadata:
      labels:
        app: fake-camera
    spec:
      serviceAccountName: fake-camera
      containers:
        - name: fake-camera
          image: fake-camera:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
          env:
            - name: SERVICE_NAME
              value: fake-camera
            - name: LOG_LEVEL
              value: INFO
            # Hub's external Route (port 443, TLS passthrough). CA cert mounted
            # below from the hub-ca secret. One-time bring-up step copies
            # fleet-cluster-ca-cert from hub fleet-ops into this namespace —
            # see README.
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: fleet-kafka-bootstrap-fleet-ops.apps.jary-qs-0323.7w5j.p1.openshiftapps.com:443
            - name: KAFKA_SECURITY_PROTOCOL
              value: SSL
            - name: KAFKA_CA_CERT_PATH
              value: /etc/kafka/ca.crt
            - name: TOPIC
              value: warehouse.cameras.aisle3
            - name: COMMAND_TOPIC
              value: warehouse.cameras.commands
            - name: CAMERA_ID
              value: cam-aisle-3
            - name: AISLE_ID
              value: aisle-3
            - name: PUBLISH_HZ
              value: "0.7"
            - name: INITIAL_STATE
              value: empty
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          volumeMounts:
            - name: hub-ca
              mountPath: /etc/kafka
              readOnly: true
      volumes:
        - name: hub-ca
          secret:
            secretName: hub-kafka-ca
            items:
              - key: ca.crt
                path: ca.crt
