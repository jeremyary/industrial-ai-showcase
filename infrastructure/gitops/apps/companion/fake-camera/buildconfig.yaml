apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: fake-camera
  namespace: warehouse-edge
  labels:
    app: fake-camera
    phase: phase-1
spec:
  source:
    type: Git
    git:
      uri: https://github.com/jeremyary/industrial-ai-showcase.git
      ref: main
    sourceSecret:
      name: git-source-secret
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: workloads/fake-camera/container/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: fake-camera:latest
  triggers:
    - type: ConfigChange
