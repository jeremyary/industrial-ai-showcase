apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Aggregation of what the hub cluster reconciles via Argo CD.
# The hub root Application in ../bootstrap/root-application.yaml
# points here; each layer gets its own ApplicationSet.
resources:
  - appsets/operators.yaml
  - appsets/platform.yaml
  - appsets/observability.yaml
  - appsets/workloads.yaml
  - appsets/hub-acm.yaml
  - vault-connection.yaml
  - vault-auth.yaml
  - vault-static-secret-argocd-repo.yaml
