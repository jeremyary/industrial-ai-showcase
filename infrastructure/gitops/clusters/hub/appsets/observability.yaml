apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: https://github.com/jeremyary/industrial-ai-showcase.git
        revision: main
        directories:
          - path: infrastructure/gitops/apps/observability/*
  template:
    metadata:
      name: 'observability-{{path.basename}}'
      labels:
        phase: phase-0
        layer: observability
      annotations:
        # Server-side diff sidesteps spurious drift from fields the API
        # server auto-populates (terminationGracePeriodSeconds,
        # imagePullPolicy, etc.) that aren't in our manifests.
        argocd.argoproj.io/compare-options: ServerSideDiff=true
    spec:
      project: default
      source:
        repoURL: https://github.com/jeremyary/industrial-ai-showcase.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
