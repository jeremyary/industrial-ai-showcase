apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: openshift-gitops
spec:
  # Git generator: one Application per directory under apps/platform/.
  # Same pattern as the operators ApplicationSet. First content:
  # mlflow backend (CNPG + MinIO + bucket-init + MLflow CR).
  generators:
    - git:
        repoURL: https://github.com/jeremyary/industrial-ai-showcase.git
        revision: main
        directories:
          - path: infrastructure/gitops/apps/platform/*
  template:
    metadata:
      name: 'platform-{{path.basename}}'
      labels:
        phase: phase-0
        layer: platform
    spec:
      project: default
      source:
        repoURL: https://github.com/jeremyary/industrial-ai-showcase.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
